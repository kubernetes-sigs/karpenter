name: "Run Bench Test"

on:
  workflow_call:
    inputs:
      path:
        description: Path to the performance test
        required: true
        type: string
      runName:
        description: Name of the run, for the purpose of file naming and github comments
        required: true
        type: string
      githubSha:
        description: Sha of the github commit to check out
        required: true
        type: string
jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.githubSha }}
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: "**/go.sum"
      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_PATH=$(setup-envtest use -p path 1.31.x)
          sudo mkdir -p /usr/local/kubebuilder/bin
          sudo cp -r "$ENVTEST_PATH"/* /usr/local/kubebuilder/bin/
      - name: Run Test
        id: test-run
        shell: bash
        env:
          GOTOOLCHAIN: auto
        run: |
          echo "Go version: $(go version)"
          echo "Working directory: $(pwd)"
          cd ${{ inputs.path }}
          echo "Test directory: $(pwd)"
          echo "Listing test files with build tag:"
          grep -rl "test_performance" . --include="*.go" || echo "No files with test_performance tag"
          mkdir -p output
          echo "Running benchmarks..."
          if ! go test -tags=test_performance -run='^$' -bench=. -count=6 -timeout=30m -cpuprofile output/cpu.out -memprofile output/mem.out -v 2>&1 | tee output/results.txt; then
            echo "::error::go test failed. Output:"
            cat output/results.txt
            exit 1
          fi
          {
            echo 'OUTPUT<<EOF'
            cat output/results.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: artifact-upload
        with:
          name: ${{ inputs.runName }}
          path: ${{ inputs.path }}/output