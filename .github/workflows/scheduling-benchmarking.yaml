name: "Scheduling Benchmarking"

on:
  pull_request:
    paths:
      - "**.go"
    branches:
      - main

jobs:
  before:
    name: Before PR
    strategy:
      fail-fast: false
      matrix:
        path: ["pkg/controllers/provisioning/scheduling", "pkg/controllers/disruption"]
    uses: ./.github/workflows/run-bench-test.yaml
    secrets: inherit
    with:
      path: ${{ matrix.path }}
      runName: before-${{ strategy.job-index }}
      githubSha: ${{ github.event.pull_request.base.sha }}
  after:
    name: After PR
    strategy:
      fail-fast: false
      matrix:
        path: ["pkg/controllers/provisioning/scheduling", "pkg/controllers/disruption"]
    uses: ./.github/workflows/run-bench-test.yaml
    secrets: inherit
    with:
      path: ${{ matrix.path }}
      runName: after-${{ strategy.job-index }}
      githubSha: ${{ github.sha }}
  compare:
    name: Compare Results
    needs: [before, after]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - index: 0
            name: scheduling
          - index: 1
            name: consolidation
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: before-${{ matrix.index }}
          path: before
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: after-${{ matrix.index }}
          path: after
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Compare benchmarks
        id: benchstat
        shell: bash
        run: |
          RESULT=$(benchstat before/results.txt after/results.txt 2>&1 || true)
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Check for statistically significant regressions > 20%
          # benchstat output format: "Name  old  new  +X.XX% (p=0.XXX)"
          if echo "$RESULT" | grep -E '\+[2-9][0-9]\.[0-9]+%|\+[1-9][0-9]{2,}\.[0-9]+%' | grep -v '~' | grep -qE 'p=0\.0[0-4]'; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Post PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2.9.2
        with:
          header: bench-${{ matrix.name }}
          message: |
            ## ${{ matrix.name }} benchmark comparison

            <details>
            <summary>benchstat output</summary>

            ```
            ${{ steps.benchstat.outputs.result }}
            ```

            </details>

            ${{ steps.benchstat.outputs.regression == 'true' && '⚠️ **Statistically significant regression detected (>20%, p<0.05).** Please investigate before merging.' || '✅ No significant regression detected.' }}
      - name: Fail on regression
        if: steps.benchstat.outputs.regression == 'true'
        run: |
          echo "::error::Performance regression detected in ${{ matrix.name }} benchmarks"
          exit 1